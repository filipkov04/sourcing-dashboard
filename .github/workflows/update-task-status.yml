name: Update Task Status

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'lib/**'
      - 'prisma/**'
      - 'package.json'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-tasks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install tsx --save-dev

      - name: Run task tracker
        run: npm run track-tasks

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet docs/tasks/TASK_LIST.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/tasks/TASK_LIST.md
          git commit -m "🤖 Auto-update task status based on codebase analysis"
          git push
